<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>バイト代 計算アプリ</title>

<!-- PWA(アプリのように使うための設定) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<!-- iPhone(Safari)用: 全画面表示・アイコン・アプリ名 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="バイト代">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <h1>バイト代</h1>
  <p class="subtitle">月初めから今日までに稼いだ金額を記録・集計します</p>
</header>

<main id="app"></main>

<footer class="app-footer">
  <button id="resetBtn" class="link-btn">すべての記録を削除</button>
</footer>

<script src="app.js"></script>
<script>
  // サービスワーカーを登録(オフライン起動のため)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW登録失敗:", e));
    });
  }
</script>
</body>
</html>
